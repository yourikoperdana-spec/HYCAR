<!DOCTYPE html>
<html>
<head>
<title>Alarm</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container py-5">

<div class="card-custom text-center">

<h1>Alarm Obat</h1>

<input type="time" id="jam" class="form-control input-custom mt-4 mb-4">

<button onclick="setAlarm()" class="btn-custom">
Simpan Alarm
</button>

<h3 id="hasil" class="mt-4"></h3>

</div>

</div>

<script>
function setAlarm(){

let jam=document.getElementById('jam').value;

document.getElementById('hasil').innerHTML=
'Alarm Disimpan : '+jam;
}
</script>

</body>
</html>

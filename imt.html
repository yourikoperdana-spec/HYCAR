<!DOCTYPE html>
<html>

<head>
    <title>IMT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="container py-5">

        <div class="card-custom">

            <h1 class="mb-4">
                Kalkulator IMT
            </h1>

            <!-- GENDER -->
            <select id="gender" class="form-control input-custom mb-3">

                <option value="">
                    Pilih Gender
                </option>

                <option value="Laki-laki">
                    Laki-laki
                </option>

                <option value="Perempuan">
                    Perempuan
                </option>

            </select>

            <!-- BERAT -->
            <input type="number"
                id="bb"
                placeholder="Berat Badan (kg)"
                class="form-control input-custom mb-3">

            <!-- TINGGI -->
            <input type="number"
                id="tb"
                placeholder="Tinggi Badan (cm)"
                class="form-control input-custom mb-3">

            <!-- BUTTON -->
            <button onclick="hitungIMT()" class="btn-custom">

                Hitung IMT

            </button>

            <!-- HASIL -->
            <div id="hasil" class="mt-4"></div>

        </div>

    </div>

    <script>

        function hitungIMT() {

            let gender = document.getElementById('gender').value;
            let bb = document.getElementById('bb').value;
            let tb = document.getElementById('tb').value / 100;

            if (gender == '' || bb == '' || tb == '') {

                document.getElementById('hasil').innerHTML =
                    'Lengkapi semua data';

                return;
            }

            let imt = bb / (tb * tb);

            let kategori = '';

            if (imt < 18.5) {
                kategori = 'Kurus';
            }
            else if (imt < 25) {
                kategori = 'Normal';
            }
            else if (imt < 30) {
                kategori = 'Berlebih';
            }
            else {
                kategori = 'Obesitas';
            }

            document.getElementById('hasil').innerHTML =

                `
                <div class="alert alert-info rounded-4">

                    <h4>Hasil IMT</h4>

                    <p><b>Gender:</b> ${gender}</p>

                    <p><b>IMT:</b> ${imt.toFixed(2)}</p>

                    <p><b>Kategori:</b> ${kategori}</p>

                </div>
                `;
        }

    </script>

</body>

</html>

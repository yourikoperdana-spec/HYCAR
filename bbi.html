<!DOCTYPE html>
<html>

<head>

    <title>BBI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../style.css">

</head>

<body>

    <div class="container py-5">

        <div class="card-custom">

            <h1 class="mb-4">
                Kalkulator BBI
            </h1>

            <!-- GENDER -->
            <select id="gender" class="form-control input-custom mb-3">

                <option value="">
                    Pilih Gender
                </option>

                <option value="Laki-laki">
                    Laki-laki
                </option>

                <option value="Perempuan">
                    Perempuan
                </option>

            </select>

            <!-- TINGGI -->
            <input type="number"
                id="tinggi"
                placeholder="Tinggi Badan (cm)"
                class="form-control input-custom mb-3">

            <!-- BUTTON -->
            <button onclick="hitungBBI()" class="btn-custom">

                Hitung BBI

            </button>

            <!-- HASIL -->
            <div id="hasil" class="mt-4"></div>

        </div>

    </div>

    <script>

        function hitungBBI() {

            let gender = document.getElementById('gender').value;

            let tinggi = document.getElementById('tinggi').value;

            if (gender == '' || tinggi == '') {

                document.getElementById('hasil').innerHTML =
                    'Lengkapi semua data';

                return;
            }

            let hasil = 0;

            if (gender == 'Laki-laki') {

                hasil = (tinggi - 100) - ((tinggi - 100) * 0.10);

            } else {

                hasil = (tinggi - 100) - ((tinggi - 100) * 0.15);

            }

            document.getElementById('hasil').innerHTML =

                `
                <div class="alert alert-success rounded-4">

                    <h4>Hasil BBI</h4>

                    <p><b>Gender:</b> ${gender}</p>

                    <p><b>BBI Ideal:</b> ${hasil.toFixed(2)} Kg</p>

                </div>
                `;
        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Konsultan HYCARE</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <style>

        body{
            background:#e0f2fe;
        }

        .chat-container{
            max-width:500px;
            margin:auto;
            height:100vh;
            display:flex;
            flex-direction:column;
        }

        .chat-header{
            background:linear-gradient(90deg,#0ea5e9,#38bdf8);
            color:white;
            padding:20px;
            border-bottom-left-radius:25px;
            border-bottom-right-radius:25px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .chat-header h3{
            margin:0;
            font-weight:600;
        }

        .chat-body{
            flex:1;
            padding:20px;
            overflow-y:auto;
        }

        .message{
            max-width:80%;
            padding:14px 18px;
            border-radius:20px;
            margin-bottom:15px;
            animation:fadeUp 0.3s ease;
        }

        .bot{
            background:white;
            color:#0f172a;
            border-top-left-radius:5px;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .user{
            background:#0ea5e9;
            color:white;
            margin-left:auto;
            border-top-right-radius:5px;
            box-shadow:0 5px 15px rgba(14,165,233,0.2);
        }

        .chat-input{
            display:flex;
            gap:10px;
            padding:15px;
            background:white;
            border-top:1px solid #cbd5e1;
        }

        .chat-input input{
            flex:1;
            border:none;
            background:#f1f5f9;
            border-radius:15px;
            padding:14px;
            outline:none;
        }

        .chat-input button{
            border:none;
            background:#0ea5e9;
            color:white;
            padding:0 25px;
            border-radius:15px;
            font-weight:600;
        }

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(15px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

    <div class="chat-container">

        <!-- HEADER -->
        <div class="chat-header">

            <h3>
                🤖 Maula Konsultan HYCARE
            </h3>

            <small>
                Maula Aktif Sekarang
            </small>

        </div>

        <!-- CHAT BODY -->
        <div class="chat-body" id="chatBody">

            <div class="message bot">

                Halo 👋<br><br>

                Saya Maula Konsultan HYCARE.<br>

                Saya dapat membantu anda tentang:<br><br>

                • Hipertensi<br>
                • Makanan sehat<br>
                • Olahraga<br>
                • Tekanan darah<br>
                • Obat hipertensi<br><br>

                Silakan bertanya 😊

            </div>

        </div>

        <!-- INPUT -->
        <div class="chat-input">

            <input type="text"
                id="messageInput"
                placeholder="Tulis pertanyaan...">

            <button onclick="sendMessage()">

                Kirim

            </button>

        </div>

    </div>

    <script>

        function sendMessage(){

            let input=document.getElementById('messageInput');

            let text=input.value.trim();

            if(text==='') return;

            let chatBody=document.getElementById('chatBody');

            // USER MESSAGE
            let userMessage=document.createElement('div');

            userMessage.className='message user';

            userMessage.innerHTML=text;

            chatBody.appendChild(userMessage);

            input.value='';

            chatBody.scrollTop=chatBody.scrollHeight;

            // AI LOADING
            setTimeout(()=>{

                let botMessage=document.createElement('div');

                botMessage.className='message bot';

                botMessage.innerHTML=getAIResponse(text);

                chatBody.appendChild(botMessage);

                chatBody.scrollTop=chatBody.scrollHeight;

            },700);

        }

        function getAIResponse(message){

            message=message.toLowerCase();

            // HIPERTENSI
            if(message.includes('hipertensi')){

                return `
                Hipertensi adalah kondisi tekanan darah tinggi.
                Jika tidak dikontrol dapat menyebabkan stroke
                dan penyakit jantung.
                `;
            }

            // GEJALA
            if(
                message.includes('gejala') ||
                message.includes('pusing') ||
                message.includes('sakit kepala')
            ){

                return `
                Gejala hipertensi dapat berupa:
                <br><br>
                • Pusing
                <br>
                • Sakit kepala
                <br>
                • Sesak napas
                <br>
                • Nyeri dada
                `;
            }

            // MAKANAN
            if(
                message.includes('makanan') ||
                message.includes('makan')
            ){

                return `
                Untuk penderita hipertensi disarankan:
                <br><br>
                ✅ Sayur
                <br>
                ✅ Buah
                <br>
                ✅ Air putih
                <br><br>
                Hindari:
                <br>
                ❌ Garam berlebih
                <br>
                ❌ Makanan instan
                <br>
                ❌ Gorengan
                `;
            }

            // OLAHRAGA
            if(
                message.includes('olahraga') ||
                message.includes('lari') ||
                message.includes('jalan')
            ){

                return `
                Olahraga ringan sangat baik untuk hipertensi.
                <br><br>
                Rekomendasi:
                <br>
                • Jalan kaki
                <br>
                • Sepeda santai
                <br>
                • Senam ringan
                <br><br>
                Minimal 30 menit per hari.
                `;
            }

            // OBAT
            if(
                message.includes('obat')
            ){

                return `
                Obat hipertensi harus diminum rutin sesuai anjuran dokter.
                Jangan menghentikan obat tanpa konsultasi.
                `;
            }

            // TENSI
            if(
                message.includes('tensi') ||
                message.includes('tekanan darah')
            ){

                return `
                Tekanan darah normal sekitar 120/80 mmHg.
                Jika di atas 140/90 mmHg termasuk hipertensi.
                `;
            }

            // STRESS
            if(
                message.includes('stress')
            ){

                return `
                Stress dapat meningkatkan tekanan darah.
                Cobalah:
                <br><br>
                • Tidur cukup
                <br>
                • Relaksasi
                <br>
                • Kurangi beban pikiran
                `;
            }

            // DEFAULT
            return `
            Terima kasih 😊<br><br>

            Saya masih AI sederhana HYCARE.<br>

            Coba tanyakan tentang:
            <br><br>

            • Hipertensi
            <br>
            • Gejala
            <br>
            • Obat
            <br>
            • Makanan
            <br>
            • Olahraga
            <br>
            • Tekanan darah
            `;
        }

        // ENTER KEY
        document.getElementById('messageInput')
        .addEventListener('keypress',function(e){

            if(e.key==='Enter'){

                sendMessage();
            }

        });

    </script>

</body>

</html>
